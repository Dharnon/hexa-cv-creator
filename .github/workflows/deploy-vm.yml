name: Deploy VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      SAP_ENV_SOURCE: /etc/hexa/sap-api.env
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Docker
        run: docker --version

      - name: Verify Docker Compose
        run: docker compose version

      - name: Ensure SAP env file exists on VM
        shell: bash
        run: |
          test -f "$SAP_ENV_SOURCE" || {
            echo "Missing $SAP_ENV_SOURCE on the runner VM" >&2
            exit 1
          }

      - name: Inject SAP env into workspace
        shell: bash
        run: |
          cp "$SAP_ENV_SOURCE" server/.env.production

      - name: Write cv-server .env.production from GitHub
        shell: bash
        env:
          CV_JWT_SECRET: ${{ secrets.CV_JWT_SECRET }}
          CV_CORS_ORIGIN: ${{ vars.CV_CORS_ORIGIN }}
          CV_CORS_ORIGIN_SECRET: ${{ secrets.CV_CORS_ORIGIN }}
          CV_BOOTSTRAP_ADMIN_EMAIL: ${{ secrets.CV_BOOTSTRAP_ADMIN_EMAIL }}
          CV_FIRST_USER_IS_ADMIN: ${{ vars.CV_FIRST_USER_IS_ADMIN }}
        run: |
          set -euo pipefail
          if [ -z "${CV_JWT_SECRET:-}" ]; then
            echo "::error::Secret CV_JWT_SECRET no está definido. Repo → Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          jwt_len=${#CV_JWT_SECRET}
          if [ "$jwt_len" -lt 16 ]; then
            echo "::error::CV_JWT_SECRET debe tener al menos 16 caracteres (longitud actual: ${jwt_len})."
            exit 1
          fi
          CORS_EFFECTIVE="${CV_CORS_ORIGIN:-${CV_CORS_ORIGIN_SECRET:-}}"
          if [ -z "$CORS_EFFECTIVE" ]; then
            echo "::error::Define la variable CV_CORS_ORIGIN o el secreto CV_CORS_ORIGIN (URLs del front, separadas por coma). Settings → Secrets and variables → Actions → Variables / Secrets."
            exit 1
          fi
          umask 077
          {
            printf '%s\n' "JWT_SECRET=${CV_JWT_SECRET}"
            printf '%s\n' "DATABASE_PATH=/app/data/cv.sqlite"
            printf '%s\n' "PORT=3847"
            printf '%s\n' "CORS_ORIGIN=${CORS_EFFECTIVE}"
          } > cv-server/.env.production
          if [ -n "${CV_BOOTSTRAP_ADMIN_EMAIL:-}" ]; then
            printf '%s\n' "BOOTSTRAP_ADMIN_EMAIL=${CV_BOOTSTRAP_ADMIN_EMAIL}" >> cv-server/.env.production
            echo "Añadido BOOTSTRAP_ADMIN_EMAIL (nuevos registros con ese correo reciben admin+hr)."
          fi
          if [ "${CV_FIRST_USER_IS_ADMIN:-}" = "true" ]; then
            printf '%s\n' "FIRST_USER_IS_ADMIN=true" >> cv-server/.env.production
            echo "Añadido FIRST_USER_IS_ADMIN=true (el primer usuario registrado será admin+hr)."
          fi
          echo "cv-server/.env.production escrito (JWT length=${jwt_len}, CORS origins configurados)."

      - name: Strip BOM from env/config files
        shell: bash
        run: |
          [ -f .env ] && sed -i 's/\xEF\xBB\xBF//g' .env || true
          [ -f server/.env.production ] && sed -i 's/\xEF\xBB\xBF//g' server/.env.production || true
          [ -f cv-server/.env.production ] && sed -i 's/\xEF\xBB\xBF//g' cv-server/.env.production || true
          [ -f deploy/nginx.conf ] && sed -i 's/\xEF\xBB\xBF//g' deploy/nginx.conf || true

      - name: Build and deploy
        run: docker compose up -d --build --remove-orphans

      - name: Smoke check API
        shell: bash
        run: |
          sleep 10
          curl --fail http://127.0.0.1/sap-api/health
          curl --fail http://127.0.0.1/cv-api-health

      - name: Cleanup dangling images
        run: docker image prune -f
